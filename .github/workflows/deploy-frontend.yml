# ============================================================
# Frontend CI/CD Workflow — Static Website (Azure Blob Storage)
# ============================================================
# Triggers: any push to main that changes files in frontend/
#           or manually from the GitHub Actions UI
# What it does:
#   1. Checks out your code
#   2. Logs into Azure using your service principal
#   3. Uploads index.html to the $web container in blob storage
#   4. Purges the Azure Front Door cache
# ============================================================

name: Deploy Frontend to Azure Storage

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'          # Only runs when frontend files change
  workflow_dispatch:            # Enables manual trigger from GitHub Actions UI

jobs:
  deploy-frontend:
    name: Deploy to Azure Blob Storage
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Upload frontend to blob storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
              --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
              --destination '$web' \
              --source frontend/ \
              --overwrite true \
              --content-type 'text/html'

      - name: Purge Front Door cache
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az afd endpoint purge \
              --resource-group crc-staticwebapp \
              --profile-name crc-cdn-profile \
              --endpoint-name crc-david-resume \
              --domains www.davidtshitenda.co.za \
              --content-paths '/*'

      - name: Logout of Azure
        run: az logout
        if: always()
