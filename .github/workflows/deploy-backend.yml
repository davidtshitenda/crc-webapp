# ============================================================
# Backend CI/CD Workflow — Python Azure Function
# ============================================================
# Triggers: any push to main that changes files in crc-api-python/
# What it does:
#   1. Checks out your code
#   2. Sets up Python 3.12
#   3. Installs dependencies from requirements.txt
#   4. Logs into Azure using your service principal
#   5. Deploys the Function to crc-counter-api-python
# ============================================================

name: Deploy Python Function App

on:
  push:
    branches:
      - main
    paths:
      - 'crc-api-python/**'   # Only runs when Python Function files change

jobs:
  deploy-function:
    name: Deploy to Azure Function App
    runs-on: ubuntu-latest    # GitHub-hosted Linux runner

    steps:

      # Step 1 — Check out the repo code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python 3.12 on the runner
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — Install Python dependencies into a local folder
      # The .python_packages folder gets picked up by Azure Functions runtime
      - name: Install dependencies
        run: |
          cd crc-api-python
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      # Step 4 — Log into Azure using the service principal credentials
      # AZURE_CREDENTIALS secret contains the JSON from az ad sp create-for-rbac
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 5 — Deploy the Function App
      # Uses the official Azure Functions action
      - name: Deploy Python Function App
        uses: Azure/functions-action@v1
        with:
          app-name: crc-counter-api-python
          package: crc-api-python
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      # Step 6 — Log out of Azure (security best practice)
      - name: Logout of Azure
        run: az logout
        if: always()    # Runs even if previous steps fail
